<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StudyAgent 静态原型</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- 应用根容器（毛玻璃背景遮罩） -->
    <div class="app">

        <!-- ====== 顶部导航栏 ====== -->
        <header class="top-header">
            <div>
                <h1>StudyAgent</h1>
                <p>面向大学生学习管理的多工具调用智能体</p>
            </div>
            <span class="demo-badge">Demo Mode</span>
        </header>

        <!-- ====== 三栏主布局：左侧菜单 | 中间工作区 | 右侧工具面板 ====== -->
        <main class="layout">

            <!-- ====== 左侧边栏：功能菜单导航 ====== -->
            <aside class="sidebar" aria-label="功能菜单">
                <nav>
                    <button class="menu-item active" type="button">智能问答</button>
                    <button class="menu-item" type="button">学习任务</button>
                    <button class="menu-item" type="button">错题分析</button>
                    <button class="menu-item" type="button">资料检索</button>
                    <button class="menu-item" type="button">工具日志</button>
                    <button class="menu-item" type="button">测试用例</button>
                </nav>
            </aside>

            <!-- ====== 中间工作区：聊天面板 + 学习仪表盘 ====== -->
            <section class="workspace" aria-label="聊天与学习概览">

                <!-- ====== 智能问答聊天面板 ====== -->
                <section class="chat-panel">
                    <!-- 面板标题栏 -->
                    <div class="panel-heading">
                        <div>
                            <h2>智能问答</h2>
                            <p>输入学习问题，系统将模拟选择合适工具完成分析。</p>
                        </div>
                        <button type="button" class="clear-chat-btn" id="clearChatBtn">清空聊天记录</button>
                    </div>

                    <!-- 聊天消息列表 -->
                    <div class="chat-messages" id="chatMessages" aria-live="polite">
                        <article class="message ai-message">
                            <div class="message-role">AI</div>
                            <div class="message-bubble">你好，我是 StudyAgent。你可以询问学习任务、错题分布、资料重点或复习安排，我会根据输入模拟调用多个学习管理工具并生成回答。</div>
                        </article>
                    </div>

                    <!-- 示例快捷问题按钮 -->
                    <div class="example-area" aria-label="示例问题">
                        <button class="example-button" type="button" data-question="我今天有哪些学习任务？">我今天有哪些学习任务？</button>
                        <button class="example-button" type="button" data-question="我最近数据结构错题集中在哪些知识点？">我最近数据结构错题集中在哪些知识点？</button>
                        <button class="example-button" type="button" data-question="帮我查一下资料里 B+ 树的重点。">帮我查一下资料里 B+ 树的重点。</button>
                        <button class="example-button" type="button" data-question="我今晚有 3 小时，明天考数据结构，帮我安排复习计划。">我今晚有 3 小时，明天考数据结构，帮我安排复习计划。</button>
                    </div>

                    <!-- Agent 模式切换 -->
                    <div class="mode-selector">
                        <span class="mode-label">Agent 模式：</span>
                        <div class="mode-toggle">
                            <button type="button" class="mode-btn active" data-mode="agent">新版 Agent</button>
                            <button type="button" class="mode-btn" data-mode="rule">规则版 Agent</button>
                        </div>
                    </div>

                    <!-- 聊天输入栏 -->
                    <form class="chat-input-bar" id="chatForm">
                        <input id="messageInput" type="text" placeholder="输入你的学习问题..." autocomplete="off">
                        <button type="submit">发送</button>
                    </form>
                </section>

                <!-- ====== 底部学习仪表盘 ====== -->
                <section class="dashboard" aria-label="学习仪表盘">
                    <!-- 统计卡片区域 -->
                    <div class="stat-grid">
                        <article class="stat-card">
                            <span>今日任务</span>
                            <strong>6</strong>
                        </article>
                        <article class="stat-card">
                            <span>已完成</span>
                            <strong>4</strong>
                        </article>
                        <article class="stat-card">
                            <span>错题数量</span>
                            <strong>28</strong>
                        </article>
                        <article class="stat-card">
                            <span>工具调用次数</span>
                            <strong>12</strong>
                        </article>
                    </div>

                    <!-- 各科学习进度概览 -->
                    <section class="overview">
                        <h2>学习情况概览</h2>
                        <div class="progress-list">
                            <div class="progress-item">
                                <div class="progress-meta">
                                    <span>数据结构</span>
                                    <strong>75%</strong>
                                </div>
                                <div class="progress-track">
                                    <div class="progress-fill fill-data-structure"></div>
                                </div>
                            </div>
                            <div class="progress-item">
                                <div class="progress-meta">
                                    <span>CSAPP</span>
                                    <strong>60%</strong>
                                </div>
                                <div class="progress-track">
                                    <div class="progress-fill fill-csapp"></div>
                                </div>
                            </div>
                            <div class="progress-item">
                                <div class="progress-meta">
                                    <span>高等数学</span>
                                    <strong>50%</strong>
                                </div>
                                <div class="progress-track">
                                    <div class="progress-fill fill-math"></div>
                                </div>
                            </div>
                        </div>
                    </section>
                </section>
            </section>

            <!-- ====== 右侧面板：工具调用过程展示 ====== -->
            <aside class="tool-panel" aria-label="工具调用过程">
                <div class="panel-heading">
                    <div>
                        <h2>工具调用过程</h2>
                        <p>根据问题类型展示模拟工具链。</p>
                    </div>
                </div>
                <div class="tool-list" id="toolList">
                    <div class="empty-state">等待用户提问后显示工具调用过程。</div>
                </div>
            </aside>

        </main>
    </div>

    <script src="app.js"></script>
</body>
</html>
